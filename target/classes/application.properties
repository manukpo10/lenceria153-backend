spring.application.name=merceria-backend

# Server
server.port=3001

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Default: H2 dev (override with --spring.profiles.active=prod or env SPRING_PROFILES_ACTIVE=prod)
spring.datasource.url=jdbc:h2:file:./data/merceria;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=merceria153-secret-change-in-production-very-long-key-12345
app.jwt.expiration-ms=28800000

# CORS
app.cors.origin=${CORS_ORIGIN:http://localhost:3000,http://localhost:3002}

# Production overrides (set SPRING_PROFILES_ACTIVE=prod or --spring.profiles.active=prod)
# See application-prod.properties for PostgreSQL/Space config